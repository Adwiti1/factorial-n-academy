services:
  frontend:
    build: .
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-demo-api-key}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-demo-factorial-n-academy.firebaseapp.com}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-demo-factorial-n-academy}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-demo-factorial-n-academy.appspot.com}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-000000000000}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-1:000000000000:web:demo}
      - VITE_USE_FIREBASE_EMULATORS=${VITE_USE_FIREBASE_EMULATORS:-true}
    depends_on:
      - firebase

  firebase:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g firebase-tools && firebase emulators:start --project demo-factorial-n-academy --host 0.0.0.0 --import .firebase-data --export-on-exit .firebase-data"
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
      - "9199:9199"
    volumes:
      - .:/app
